{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link rel="stylesheet" href="{% static 'home.css' %}">
</head>
<body>

    <header class="navbar">
        <div class="nav-logo">
            <img src="{% static 'iconreview.png' %}">
        </div>
        <div class="nav-links">
            {% if user.is_authenticated %}
            <a class="nav-user">Usuário: {{ user.username }}</a>
            <a href="{% url 'login' %}" class="nav-item login">Loggout</a>
            {% else %}
            <a href="{% url 'login' %}" class="nav-item login">Login</a>
            {% endif %}
            <a href="{% url 'cadastro' %}" class="nav-item cadastro">Cadastro</a>
            <a href="#" class="nav-item outro">Admin</a>
        </div>
    </header>

</body>
</html>
